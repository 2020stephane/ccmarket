   <meta name="description" content="Camping-Car Market - Votre spécialiste en pièces détachées pour camping-car.">
   <meta name="keywords" content="pièces détachées, camping-car, accessoires, mécanique, carrosserie">
   <link rel="stylesheet" href="/css/mesannonces.css">
   <title>Camping-Car Market</title>
</head>
<body>
   <!--==================================================
======================  HEADER  ======================
===================================================-->
   <header>
      <img class="logo-img" src="/img/Logo_paysage.png" alt="Logo Camping-Car Market">
      <img class="logo-titre" src="/img/Titre_CC_Market.png" alt="Titre Camping-Car Market">
      <button class="btn-hamburger" type="button" aria-label="Ouvrir le menu" aria-expanded="false"
         aria-controls="nav-menu">
         <span></span>
         <span></span>
         <span></span>
      </button>
      <nav aria-label="Navigation principale">
         <ul class="nav-menu">
            <li>
               <a href="index.html">Accueil</a>
            </li>
            <li>
               <a href="#" class="disabled" aria-disabled="true" tabindex="-1">Mes annonces</a>
            </li>
            <li>
               <a href="#" class="disabled" aria-disabled="true" tabindex="-1">Messages</a>
            </li>
            <li>
               <a href="rechercher.html" class="rechercher">Rechercher</a>
            </li>
            <li>
               <button id="btn_connection">Se connecter</button>
            </li>
         </ul>
      </nav>
   </header>
  
    <!--=====================================================
======================  Mes annonces  ================
======================================================-->
<main class="main_class">
   <section class="annonces">
      <h1 class="section-title">Mes annonces :</h1>
      <ul class="annonces_grid"></ul>
   </section>
   <h2 id="id_h2">Publier une nouvelle annonce :</h2>
        <form action="/api/publierannonce" method="POST" enctype="multipart/form-data">

            <div class="form_group">
                <label for="titre">Titre de l'annonce :</label>
                <input type="text" name="titre" id="titre" maxlength="25" placeholder="titre">
            </div>

            <div class="form_group">
               <label for="prix">Prix (€) :</label>
               <input type="number" step="0.01" name="prix" id="prix" min="0" max="999999" placeholder="prix" required>
            </div>

            <div class="form_group">
               <label for="description">Description :</label>
               <textarea name="description" id="description" rows="5" maxlength="40" placeholder="description"></textarea>
            </div>

            <div class="form_group">
               <label for="photo">Photo :</label>
               <input type="file" id="photo" name="photo" accept="image/*">
            </div>
            <button type="submit" class="btn_publier">Publier l'annonce</button>
        </form>
       
   </main>
   <!--=====================================================
======================  FOOTER  =========================
======================================================-->
   <footer class="main-footer">
      <nav class="footer-links">
         <a href="contact.html">Contact</a>
         <a href="mentions_legales.html">Mentions légales</a>
      </nav>
      <div class="footer-copyright">2026 Camping-Car Market.</div>
   </footer>
<script src="/js/authentification.js"></script>
</body>
</html>
