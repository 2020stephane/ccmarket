   <meta name="description" content="Camping-Car Market - Votre spécialiste en pièces détachées pour camping-car.">
   <meta name="keywords" content="pièces détachées, camping-car, accessoires, mécanique, carrosserie">
   <link rel="stylesheet" href="/css/connection.css">

</head>

<body>
   <!--==================================================
======================  HEADER  ======================
===================================================-->
   <header>
      <img class="logo-img" src="/img/Logo_paysage.png" alt="Logo Camping-Car Market">
      <img class="logo-titre" src="/img/Titre_CC_Market.png" alt="Titre Camping-Car Market">
      <button class="btn-hamburger" type="button" aria-label="Ouvrir le menu" aria-expanded="false" aria-controls="nav-menu">
         <span></span>
         <span></span>
         <span></span>
      </button>
      <nav aria-label="Navigation principale">
         <ul class="nav-menu">
            <li>
               <a href="index.html">Accueil</a>
            </li>
            <li>
               <a href="#" class="disabled" aria-disabled="true" tabindex="-1">Mes annonces</a>
            </li>
            <li>
               <a href="#" class="disabled" aria-disabled="true" tabindex="-1">Messages</a>
            </li>

            </li>

      </nav>
   </header>
   <!-- ==========================

         ========================== -->
   <section class="hero">
      <h1>Se connecter</h1>
      <form action="/api/connection" method="POST">
         <p>
            <label for="email">Email :</label>
            <input type="email" id="email" name="email" autocomplete="email" placeholder="Email" required>
         </p>

         <p>
            <label for="password">Mot de passe :</label>
               <input type="password" id="password" name="password" autocomplete="mot de passe"
                  placeholder="Mot de passe">
         </p>
         
         <button id="b_submit" type="submit">CONNEXION</button>
      </form>
      <p>Pas encore de compte ? <a href="inscription.html">S'inscrire</a></p>
   </section>

    ==================-->
   <footer class="main-footer">

      <div class="footer-copyright">2026 Camping-Car Market.</div>
