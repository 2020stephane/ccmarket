<!doctype html>
<html lang="fr">

<head>
   <script src="/js/menu_hamburger.js" defer></script>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta name="description" content="Camping-Car Market - Votre spécialiste en pièces détachées pour camping-car.">
   <meta name="keywords" content="pièces détachées, camping-car, accessoires, mécanique, carrosserie">
   <script src="/js/activer_menu.js" defer></script>
   <link rel="stylesheet" href="/css/inscription.css">
   <title>Camping-Car Market</title>
</head>

<body>
   <!--==================================================
======================  HEADER  ======================
===================================================-->
   <header>
      <img class="logo-img" src="/img/Logo_paysage.png" alt="Logo Camping-Car Market">
      <img class="logo-titre" src="/img/Titre_CC_Market.png" alt="Titre Camping-Car Market">
      <button class="btn-hamburger" type="button" aria-label="Ouvrir le menu" aria-expanded="false"
         aria-controls="nav-menu">
         <span></span>
         <span></span>
         <span></span>
      </button>
      <nav aria-label="Navigation principale">
         <ul class="nav-menu">
            <li>
               <a href="index.html">Accueil</a>
            </li>
            <li>
               <a href="#" class="disabled" aria-disabled="true" tabindex="-1">Mes annonces</a>
            </li>
            <li>
               <a href="#" class="disabled" aria-disabled="true" tabindex="-1">Messages</a>
            </li>
            <li>
               <a href="rechercher.html" class="rechercher">Rechercher</a>
            </li>
            <li>
               <button id="btn-connection">Se connecter</button>
            </li>
         </ul>
      </nav>
   </header>
   <!--==================================================
======================  HERO  ========================
===================================================-->
   <section class="hero">
      <h1>Créer un compte</h1>
      <form action="/api/finscription" method="POST">
         <p>
            <label for="prenom">Prénom :</label>
            <input type="text" id="prenom" name="prenom" required>
         </p>

         <p>
            <label for="nom">Nom :</label>
            <input type="text" id="nom" name="nom" required>
         </p>

         <p>
            <label for="email">e-mail :</label>
            <input type="email" id="email" name="email" required>
         </p>

         <p>
            <label for="password">Mot de passe :</label>
            <input type="password" id="password" name="password" required>
         </p>

         <button type="submit">S'inscrire</button>
      </form>
      <p>Déjà un compte ? <a href="connection.html">Se connecter</a></p>
   </section>
   <!--=====================================================
======================  FOOTER  =========================
======================================================-->
   <footer class="main-footer">
      <nav class="footer-links">
         <a href="contact.html">Contact</a>
         <a href="mentions_legales.html">Mentions légales</a>
      </nav>
      <div class="footer-copyright">2026 Camping-Car Market.</div>
   </footer>
   <script src="/js/authentification.js"></script>
</body>

</html>
