<!doctype html>
<html lang="fr">

<head>
   <script src="/js/menu_hamburger.js" defer></script>
   <script src="/js/bouton_listener.js" defer></script>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta name="description" content="Camping-Car Market - Votre spécialiste en pièces détachées pour camping-car.">
   <meta name="keywords" content="pièces détachées, camping-car, accessoires, mécanique, carrosserie">
   <link rel="stylesheet" href="/css/rechercher.css">
   <title>Camping-Car Market</title>
</head>

<body>
      <!--==================================================
======================  HEADER  ======================
===================================================-->
   <header>
      <img class="logo-img" src="/img/Logo_paysage.png" alt="Logo Camping-Car Market">
      <img class="logo-titre" src="/img/Titre_CC_Market.png" alt="Titre Camping-Car Market">
      <button class="btn-hamburger" type="button" aria-label="Ouvrir le menu" aria-expanded="false"
         aria-controls="nav-menu">
         <span></span>
         <span></span>
         <span></span>
      </button>
      <nav aria-label="Navigation principale">
         <ul class="nav-menu">
            <li>
               <a href="index.html">Accueil</a>
            </li>
            <li>
               <a href="#" class="disabled" aria-disabled="true" tabindex="-1">Mes annonces</a>
            </li>
            <li>
               <a href="#" class="disabled" aria-disabled="true" tabindex="-1">Messages</a>
            </li>
            <li>
               <a href="rechercher.html" class="rechercher">Rechercher</a>
            </li>
            <li>
               <button id="btn-connection">Se connecter</button>
            </li>
         </ul>
      </nav>
   </header>
   <!--==================================================
======================  MAIN  ========================
===================================================-->   
   <main>
      <h1>Rechercher</h1>
      <form action="/api/recherche" method="POST">
         <label for="cate"><h2>Catégories :</h2></label>
         <select name="categorie" id="cate">
            <option value="tout" selected>--Toutes catégories--</option>
            <option value="meca">Mécanique</option>
            <option value="carro">Carrosserie</option>
            <option value="acce">Accessoires</option>
            <option value="elec">Electricité</option>
         </select>
         
         <h2>Prix :</h2>
         <section class="class_prix">
            <p>
               <label for="prix_min">Prix min :</label>
               <input type="text" id="prix_min" name="prixmin" value="pmin">
            </p>

            <p>
               <label for="prix_max">Prix max :</label>
                  <input type="text" id="prix_max" name="prixmax" value="pmax">
            </p>
         </section>
         <h2>Tri :</h2>
         <p>
               <input type="radio" id="recent" name="plus_ra" value="recent">
               <label for="recent">Plus récentes.</label>
         </p>

         <p>
               <input type="radio" id="ancien" name="plus_ra" value="ancien">
               <label for="ancien">Plus anciennes.</label>
         </p>

         <p>
               <input type="radio" id="prixc" name="prix_cd" value="crois">
               <label for="prixc">Prix croissants.</label>
         </p>

         <p>
               <input type="radio" id="prixd" name="prix_cd" value="decrois">
               <label for="prixd">Prix décroissants.</label>
         </p>
         <button id="b_submit" type="submit">RECHERCHER</button>
      </form>
     </main>
  
   <!--=====================================================
======================  FOOTER  =========================
======================================================-->
   <footer class="main-footer">
      <nav class="footer-links">
         <a href="contact.html">Contact</a>
         <a href="mentions_legales.html">Mentions légales</a>
      </nav>
      <div class="footer-copyright">2026 Camping-Car Market.</div>
   </footer>
</body>
</html>
